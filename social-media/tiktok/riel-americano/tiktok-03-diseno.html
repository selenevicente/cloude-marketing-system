<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Riel Americano TikTok — 03 Diseño</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400;1,700&display=swap" rel="stylesheet">
<!--
  ══════════════════════════════════════════
  USO COMO OVERLAY SOBRE VIDEO:
  Eliminá el div .photo → los gradientes
  funcionan sobre el video de fondo.
  Tip: usar con travelling cinematográfico
  de espacio de diseño (ver VIDEO-PROMPTS).
  ══════════════════════════════════════════
-->
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0A0A0A;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 20px;
  font-family: 'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif;
}

.scale-wrap {
  position: relative;
  width: 405px;
  height: 720px;
  overflow: hidden;
  flex-shrink: 0;
  border-radius: 6px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
}

.post {
  width: 1080px;
  height: 1920px;
  transform: scale(0.375);
  transform-origin: top left;
  position: absolute;
  top: 0; left: 0;
  overflow: hidden;
}

/* ── FOTO DE FONDO ── */
/* Pieza 03 — living minimalista, la foto tiene más protagonismo */
.photo {
  position: absolute;
  inset: 0;
  background: url('../../instagram/riel-americano/posts/photos/post4-living.jpg') center 35% / cover no-repeat;
  /* Color natural — sin filtro B&W, estilo editorial de arquitectura */
  filter: brightness(0.78) saturate(0.88) contrast(1.04);
}

/* Overlay más suave en el centro — la foto arquitectónica debe respirar */
.overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to bottom,
      rgba(6,5,4,0.88)  0%,
      rgba(6,5,4,0.52)  13%,
      rgba(6,5,4,0.06)  28%,
      rgba(6,5,4,0.02)  55%,
      rgba(6,5,4,0.42)  70%,
      rgba(6,5,4,0.86)  83%,
      rgba(6,5,4,0.97)  100%);
}

/* ── CONTENIDO ── */
.inner {
  position: absolute;
  inset: 0;
  z-index: 10;
  padding: 140px 210px 270px 70px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.tag {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #C8102E;
  line-height: 1;
}

.title-block {
  display: flex;
  flex-direction: column;
  gap: 26px;
}

/* Número de serie — decorativo, muy suave */
.series-num {
  font-size: 18px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.22);
}

.title {
  font-size: 80px;
  font-weight: 800;
  line-height: 1.07;
  letter-spacing: -1.8px;
  color: #FFFFFF;
}

/* Subtítulo — elegante, itálico */
.sub {
  font-size: 26px;
  font-weight: 400;
  font-style: italic;
  color: rgba(255,255,255,0.52);
  line-height: 1.60;
}

.caption-zone {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.handle {
  font-size: 34px;
  font-weight: 700;
  color: #FFFFFF;
  letter-spacing: -0.4px;
}

.hashtags {
  font-size: 26px;
  font-weight: 400;
  color: rgba(255,255,255,0.45);
  line-height: 1.65;
}
</style>
</head>
<body>
<div class="scale-wrap">
<div class="post">

  <div class="photo"></div>
  <div class="overlay"></div>

  <div class="inner">

    <div class="tag">55 Ventanas Argentinas · Nº 01</div>

    <div class="title-block">
      <span class="series-num">Riel Americano · Desde 1967</span>
      <h1 class="title">Donde el<br>diseño argentino<br>abre sus<br>ventanas.</h1>
      <p class="sub">Faena, MALBA.<br>55 años vistiendo el diseño nacional.</p>
    </div>

    <div class="caption-zone">
      <span class="handle">@rielamericano</span>
      <span class="hashtags">#55VentanasArgentinas #DiseñoArgentino<br>#Arquitectura</span>
    </div>

  </div>
</div>
</div>
</body>
</html>
