<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Riel Americano TikTok — 02 Innovación</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400;1,700&display=swap" rel="stylesheet">
<!--
  ══════════════════════════════════════════
  USO COMO OVERLAY SOBRE VIDEO:
  Eliminá el div .photo → los gradientes
  ya funcionan como overlay transparente
  sobre cualquier video de fondo.
  ══════════════════════════════════════════
-->
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0A0A0A;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 20px;
  font-family: 'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif;
}

.scale-wrap {
  position: relative;
  width: 405px;
  height: 720px;
  overflow: hidden;
  flex-shrink: 0;
  border-radius: 6px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
}

.post {
  width: 1080px;
  height: 1920px;
  transform: scale(0.375);
  transform-origin: top left;
  position: absolute;
  top: 0; left: 0;
  overflow: hidden;
  background: #0D0F14;
}

/* ── FOTO DE FONDO ── */
.photo {
  position: absolute;
  inset: 0;
  background: url('../../instagram/riel-americano/posts/photos/post2-smart.jpg') center center / cover no-repeat;
  filter: brightness(0.82) saturate(0.9);
}

/* Overlay tech — más frío, menos cálido que Pieza 01 */
.overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to bottom,
      rgba(5,8,18,0.88)  0%,
      rgba(5,8,18,0.60)  14%,
      rgba(5,8,18,0.10)  30%,
      rgba(5,8,18,0.06)  50%,
      rgba(5,8,18,0.32)  66%,
      rgba(5,8,18,0.82)  80%,
      rgba(5,8,18,0.97)  100%);
}

/* ── CONTENIDO ── */
.inner {
  position: absolute;
  inset: 0;
  z-index: 10;
  padding: 140px 210px 270px 70px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.tag {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #C8102E;
  line-height: 1;
}

.title-block {
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.title {
  font-size: 82px;
  font-weight: 800;
  line-height: 1.06;
  letter-spacing: -2px;
  color: #FFFFFF;
}

/* Subtítulo pequeño — especificaciones técnicas */
.specs {
  font-size: 29px;
  font-weight: 400;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.5px;
  line-height: 1.55;
  /* Leve separador antes de los specs */
  padding-top: 4px;
  border-top: 1px solid rgba(255,255,255,0.14);
}

.caption-zone {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.handle {
  font-size: 34px;
  font-weight: 700;
  color: #FFFFFF;
  letter-spacing: -0.4px;
}

.hashtags {
  font-size: 26px;
  font-weight: 400;
  color: rgba(255,255,255,0.45);
  line-height: 1.65;
}
</style>
</head>
<body>
<div class="scale-wrap">
<div class="post">

  <div class="photo"></div>
  <div class="overlay"></div>

  <div class="inner">

    <div class="tag">Así funciona el Sistema BOSS</div>

    <div class="title-block">
      <h1 class="title">Controlá toda<br>tu casa desde<br>el celular.</h1>
      <p class="specs">iOS · Android<br>Compatible con Alexa y Google</p>
    </div>

    <div class="caption-zone">
      <span class="handle">@rielamericano</span>
      <span class="hashtags">#SmartBridge #BOSS<br>#DomóticaArgentina</span>
    </div>

  </div>
</div>
</div>
</body>
</html>
