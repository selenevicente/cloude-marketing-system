<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Riel Americano — 04 Casa FOA</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0A0A0A;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif;
}

.post {
  width: 540px;
  height: 540px;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

/* Living room photo — very dark overlay → luxury black feel */
.photo {
  position: absolute;
  inset: 0;
  background: url('photos/post4-living.jpg') center center / cover no-repeat;
}

.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.80);
}

/* Diagonal texture band — design detail */
.band {
  position: absolute;
  top: 0; right: 0;
  width: 3px;
  height: 100%;
  background: #C8102E;
  z-index: 6;
}

/* Extra thin horizontal line */
.h-line {
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  height: 1px;
  background: rgba(255,255,255,0.06);
  z-index: 6;
}

.inner {
  position: absolute;
  inset: 0;
  z-index: 10;
  padding: 42px 44px 38px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.top { display: flex; align-items: center; justify-content: space-between; }

.eyebrow {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #C8102E;
}

/* 12-year badge top right */
.years-badge {
  display: flex;
  flex-direction: column;
  align-items: center;
  border: 1px solid rgba(255,255,255,0.14);
  padding: 6px 12px;
}

.years-num {
  font-size: 22px;
  font-weight: 800;
  color: #FFFFFF;
  line-height: 1;
  letter-spacing: -1px;
}

.years-label {
  font-size: 7px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-top: 2px;
}

.body { flex: 1; display: flex; flex-direction: column; justify-content: center; }

.headline {
  font-size: 48px;
  font-weight: 800;
  line-height: 1.04;
  letter-spacing: -1.5px;
  color: #FFFFFF;
  margin-bottom: 22px;
}

/* Sponsor pill */
.sponsor {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid rgba(255,255,255,0.12);
  padding: 8px 14px;
  width: fit-content;
  margin-bottom: 12px;
}

.s-dot { width: 5px; height: 5px; border-radius: 50%; background: #C8102E; }
.s-txt {
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
}

/* Events list */
.events {
  display: flex;
  gap: 18px;
  margin-top: 4px;
}

.event-item {
  font-size: 10px;
  font-weight: 500;
  color: rgba(255,255,255,0.38);
  letter-spacing: 0.5px;
}

.event-item::before {
  content: '— ';
  color: #C8102E;
  font-weight: 700;
}

.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo { display: flex; align-items: center; gap: 9px; }
.logo-circle {
  width: 34px; height: 34px; border-radius: 50%; background: #C8102E;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.logo-r { font-size: 10px; font-weight: 900; color: #fff; line-height: 1; }
.logo-a { font-size: 3px; font-weight: 400; color: rgba(255,255,255,0.85); letter-spacing: 1.3px; margin-top: 1.5px; }
.logo-name { font-size: 8px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,0.38); }
.slide-num { font-size: 9px; font-weight: 500; letter-spacing: 2px; color: rgba(255,255,255,0.16); }
</style>
</head>
<body>
<div class="post">
  <div class="photo"></div>
  <div class="overlay"></div>
  <div class="band"></div>
  <div class="h-line"></div>

  <div class="inner">

    <div class="top">
      <div class="eyebrow">04 — Diseño & Eventos</div>
      <div class="years-badge">
        <div class="years-num">12</div>
        <div class="years-label">años</div>
      </div>
    </div>

    <div class="body">
      <h2 class="headline">Donde el diseño<br>abre sus<br>ventanas.</h2>
      <div class="sponsor">
        <div class="s-dot"></div>
        <span class="s-txt">Sponsor oficial</span>
      </div>
      <div class="events">
        <span class="event-item">Casa FOA</span>
        <span class="event-item">Estilo Pilar</span>
        <span class="event-item">Casa FOA Córdoba</span>
      </div>
    </div>

    <div class="footer">
      <div class="logo">
        <div class="logo-circle">
          <span class="logo-r">RIEL</span>
          <span class="logo-a">AMERICANO</span>
        </div>
        <span class="logo-name">Riel Americano</span>
      </div>
      <span class="slide-num">4 / 6</span>
    </div>

  </div>
</div>
</body>
</html>
