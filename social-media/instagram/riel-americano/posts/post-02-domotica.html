<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Riel Americano — 02 Domótica</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0A0A0A;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif;
}

.post {
  width: 540px;
  height: 540px;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

.photo {
  position: absolute;
  inset: 0;
  /* Roller blind with garden view — domótica */
  background: url('photos/post3-roller.jpg') center center / cover no-repeat;
}

/* Lighter overlay so the photo reads clearly — cards float over it */
.overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to top,
      rgba(4,8,18,0.95) 0%,
      rgba(4,8,18,0.80) 30%,
      rgba(4,8,18,0.35) 60%,
      rgba(4,8,18,0.12) 100%);
}

/* SVG connecting lines layer */
.lines-svg {
  position: absolute;
  inset: 0;
  width: 540px;
  height: 540px;
  z-index: 6;
  pointer-events: none;
}

/* Floating feature cards */
.card {
  position: absolute;
  z-index: 10;
  background: rgba(255,255,255,0.96);
  border-radius: 10px;
  padding: 8px 12px 8px 8px;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.35), 0 1px 4px rgba(0,0,0,0.2);
  min-width: 140px;
}

.card-icon {
  width: 32px;
  height: 32px;
  border-radius: 7px;
  background: #F3F3F3;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}

.card-text {}
.card-title { font-size: 10.5px; font-weight: 700; color: #111; line-height: 1.2; }
.card-desc  { font-size: 9px; font-weight: 500; color: #C8102E; margin-top: 1px; }

/* CARD 1 — Smart Bridge (top right) */
.c1 { top: 52px; right: 18px; }

/* CARD 2 — Control por voz (center right) */
.c2 { top: 200px; right: 18px; }

/* CARD 3 — iOS + Android (left center) */
.c3 { top: 170px; left: 14px; }

/* CARD 4 — Google Home (small, bottom right of blind area) */
.c4 { top: 310px; right: 18px; }

/* Inner content */
.inner {
  position: absolute;
  inset: 0;
  z-index: 10;
  padding: 30px 38px 34px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  pointer-events: none;
}

.eyebrow {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #C8102E;
}

.bottom-block {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.headline {
  font-size: 30px;
  font-weight: 800;
  line-height: 1.10;
  letter-spacing: -0.8px;
  color: #FFFFFF;
  margin-bottom: 14px;
}

.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
}

.logo { display: flex; align-items: center; gap: 8px; }
.logo-circle {
  width: 30px; height: 30px; border-radius: 50%; background: #C8102E;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.logo-r { font-size: 9px; font-weight: 900; color: #fff; line-height: 1; }
.logo-a { font-size: 2.8px; font-weight: 400; color: rgba(255,255,255,0.85); letter-spacing: 1.2px; margin-top: 1px; }
.logo-name { font-size: 8px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,0.40); }
.slide-num { font-size: 9px; font-weight: 500; letter-spacing: 2px; color: rgba(255,255,255,0.18); }
</style>
</head>
<body>
<div class="post">
  <div class="photo"></div>
  <div class="overlay"></div>

  <!-- SVG connecting lines from cards to blind -->
  <svg class="lines-svg" viewBox="0 0 540 540">
    <!-- Dot on blind at approx 50% left, 35% down = 270,189 -->
    <!-- Card 1 Smart Bridge → blind motor (top of blind) -->
    <circle cx="270" cy="148" r="4" fill="white" opacity="0.65"/>
    <line x1="380" y1="78" x2="270" y2="148" stroke="white" stroke-width="1.2" opacity="0.55"/>

    <!-- Card 2 Control por voz → blind center -->
    <circle cx="268" cy="245" r="4" fill="white" opacity="0.65"/>
    <line x1="380" y1="224" x2="268" y2="245" stroke="white" stroke-width="1.2" opacity="0.55"/>

    <!-- Card 3 iOS+Android → blind (from left) -->
    <circle cx="270" cy="195" r="4" fill="white" opacity="0.65"/>
    <line x1="153" y1="188" x2="270" y2="195" stroke="white" stroke-width="1.2" opacity="0.55"/>

    <!-- Card 4 Google Home → blind bottom -->
    <circle cx="272" cy="295" r="4" fill="white" opacity="0.65"/>
    <line x1="380" y1="332" x2="272" y2="295" stroke="white" stroke-width="1.2" opacity="0.55"/>
  </svg>

  <!-- Floating cards -->
  <div class="card c1">
    <div class="card-icon">📡</div>
    <div class="card-text">
      <div class="card-title">Smart Bridge</div>
      <div class="card-desc">Tecnología argentina</div>
    </div>
  </div>

  <div class="card c2">
    <div class="card-icon">🎙</div>
    <div class="card-text">
      <div class="card-title">Control por voz</div>
      <div class="card-desc">Alexa · Google Home</div>
    </div>
  </div>

  <div class="card c3">
    <div class="card-icon">📱</div>
    <div class="card-text">
      <div class="card-title">iOS + Android</div>
      <div class="card-desc">App gratuita</div>
    </div>
  </div>

  <div class="card c4">
    <div class="card-icon">🏠</div>
    <div class="card-text">
      <div class="card-title">Domotización total</div>
      <div class="card-desc">BOSS · Motorizado</div>
    </div>
  </div>

  <!-- Text overlay (bottom) -->
  <div class="inner">
    <div class="eyebrow">02 — Innovación</div>
    <div class="bottom-block">
      <h2 class="headline">La domótica también<br>puede ser argentina.</h2>
      <div class="footer">
        <div class="logo">
          <div class="logo-circle">
            <span class="logo-r">RIEL</span>
            <span class="logo-a">AMERICANO</span>
          </div>
          <span class="logo-name">Riel Americano</span>
        </div>
        <span class="slide-num">2 / 6</span>
      </div>
    </div>
  </div>

</div>
</body>
</html>
